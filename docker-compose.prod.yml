version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
    container_name: library_app_prod
    restart: always
    volumes:
      - library_data:/data
    environment:
      - LOAN_DAYS=14
      - DATA_FILE=/data/library.json

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

volumes:
  library_data:
