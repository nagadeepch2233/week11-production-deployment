name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy-prod:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image (PowerShell)
      shell: pwsh
      run: |
        docker build -t library-app:prod .

    - name: Login to DockerHub (PowerShell)
      shell: pwsh
      run: |
        echo "₹{{ secrets.DOCKER_PASSWORD }}" | docker login -u "₹{{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push Image (PowerShell)
      shell: pwsh
      run: |
        docker tag library-app:prod ₹{{ secrets.DOCKER_USERNAME }}/library-app:latest
        docker push ₹{{ secrets.DOCKER_USERNAME }}/library-app:latest

    - name: Deploy to Windows Production Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ₹{{ secrets.SSH_HOST }}
        username: ₹{{ secrets.SSH_USER }}
        password: ₹{{ secrets.SSH_PASSWORD }}
        script: |
          powershell -Command "
            Write-Host 'Deploying to Production Server...';

            docker pull ₹{{ secrets.DOCKER_USERNAME }}/library-app:latest;

            docker stop library_app 2>₹null;
            docker rm library_app 2>₹null;

            docker run -dit --name library_app `
              -e LOAN_DAYS=14 `
              -e DATA_FILE=/app/library.json `
              ₹{{ secrets.DOCKER_USERNAME }}/library-app:latest;

            docker ps;
          "
