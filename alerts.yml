groups:
  - name: library-alerts
    rules:

      - alert: AppDown
        expr: up{job="library_app"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Library App is DOWN"
          description: "Application has been unreachable for 30 seconds."

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[1m]) > 0.8
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High CPU Usage"
          description: "Container CPU usage exceeded 80%."

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes > 500000000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High Memory Usage"
          description: "Memory usage exceeded 500MB."
